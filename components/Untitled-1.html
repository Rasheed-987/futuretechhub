<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Skills Course Cards</title>
    <style>
        :root {
            --curve-snappy: cubic-bezier(0.25, 1, 0.5, 1);
            --duration: 400ms;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .course-grid {
            display: flex;
            gap: 1.5rem;
            padding: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .kinetic-card {
            position: relative;
            width: clamp(200px, 20vw, 240px);
            aspect-ratio: 4 / 5;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: transform var(--duration) var(--curve-snappy),
                box-shadow var(--duration) var(--curve-snappy);
            will-change: transform;
            /* Isolate stacking context */
            isolation: isolate;
        }

        .kinetic-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        .layer {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem;
            border-radius: inherit;
            /* Prevent text selection during interaction */
            user-select: none;
        }

        /* Base Layer (Color Background, White Text) */
        .layer-base {
            background-color: var(--theme);
            color: #ffffff;
            z-index: 1;
        }

        /* Overlay Layer (White Background, Color Text) */
        .layer-overlay {
            background-color: #ffffff;
            color: var(--theme);
            z-index: 2;
            /* Start fully clipped from the top down to the bottom */
            clip-path: inset(100% 0 0 0);
            transition: clip-path var(--duration) var(--curve-snappy);
        }

        .kinetic-card:hover .layer-overlay {
            /* Reveal entirely */
            clip-path: inset(0 0 0 0);
        }

        /* Typography & Icon Sizing */
        .title {
            font-size: clamp(1.1rem, 1.5vw, 1.25rem);
            font-weight: 700;
            line-height: 1.3;
            margin-top: 1.5rem;
        }

        .icon {
            width: 64px;
            height: 64px;
            fill: currentColor;
        }
    </style>
</head>

<body>

    <div class="course-grid">

        <div class="kinetic-card" style="--theme: #13b5ea;">
            <div class="layer layer-base">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M12 2L2 22h20L12 2zm0 6l5 10H7l5-10z" />
                </svg>
                <div class="title">Graphic &<br>Web Design</div>
            </div>
            <div class="layer layer-overlay">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M12 2L2 22h20L12 2zm0 6l5 10H7l5-10z" />
                </svg>
                <div class="title">Graphic &<br>Web Design</div>
            </div>
        </div>

        <div class="kinetic-card" style="--theme: #f36c21;">
            <div class="layer layer-base">
                <svg class="icon" viewBox="0 0 24 24">
                    <path
                        d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l1.12-4.81-3.73-3.23 4.92-.42L12 5l1.92 4.53 4.92.42-3.73 3.23L16.23 18z" />
                </svg>
                <div class="title">Environmental<br>Services</div>
            </div>
            <div class="layer layer-overlay">
                <svg class="icon" viewBox="0 0 24 24">
                    <path
                        d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l1.12-4.81-3.73-3.23 4.92-.42L12 5l1.92 4.53 4.92.42-3.73 3.23L16.23 18z" />
                </svg>
                <div class="title">Environmental<br>Services</div>
            </div>
        </div>

        <div class="kinetic-card" style="--theme: #b531e2;">
            <div class="layer layer-base">
                <svg class="icon" viewBox="0 0 24 24">
                    <path
                        d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z" />
                </svg>
                <div class="title">Software<br>Development</div>
            </div>
            <div class="layer layer-overlay">
                <svg class="icon" viewBox="0 0 24 24">
                    <path
                        d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z" />
                </svg>
                <div class="title">Software<br>Development</div>
            </div>
        </div>

    </div>

</body>

</html>
